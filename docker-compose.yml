version: "3.8"

services:
  web:
    build: .
    container_name: stransport-web
    command: /bin/sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      - DJANGO_SETTINGS_MODULE=stransport_pro.settings
    volumes:
      - .:/app
    depends_on:
      - db
      - rabbitmq

  db:
    image: postgres:16-alpine
    container_name: stransport-db
    ports:
      - "5432:5432"
    env_file:
      - .env.example
    volumes:
      - db_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: stransport-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  db_data:
