services:
  web:
    build: .
    container_name: stransport-web
    command: /bin/sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      - DJANGO_SETTINGS_MODULE=stransport_pro.settings
      - DB_HOST=db
      # override .env.example so Django uses DB_* (db host) instead of DATABASE_URL (invalid host)
      - DATABASE_URL=
    volumes:
      - .:/app
    depends_on:
      - db
      - rabbitmq
      - redis
    networks:
      - default

  db:
    image: postgres:16-alpine
    container_name: stransport-db
    ports:
      - "5432:5432"
    env_file:
      - .env.example
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - default

  rabbitmq:
    image: rabbitmq:3-management
    container_name: stransport-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - default

  redis:
    image: redis:7-alpine
    container_name: stransport-redis
    ports:
      - "6379:6379"
    networks:
      - default

  celery_worker:
    build: .
    container_name: stransport-celery-worker
    command: celery -A stransport_pro worker -l info
    env_file:
      - .env.example
    environment:
      - DJANGO_SETTINGS_MODULE=stransport_pro.settings
      - DB_HOST=db
      - DATABASE_URL=
    volumes:
      - .:/app
    depends_on:
      - db
      - rabbitmq
      - redis
    networks:
      - default

  celery_beat:
    build: .
    container_name: stransport-celery-beat
    command: celery -A stransport_pro beat -l info
    env_file:
      - .env.example
    environment:
      - DJANGO_SETTINGS_MODULE=stransport_pro.settings
      - DB_HOST=db
      - DATABASE_URL=
    volumes:
      - .:/app
    depends_on:
      - db
      - rabbitmq
      - redis
    networks:
      - default

networks:
  default:
    name: stransport_net

volumes:
  db_data:
